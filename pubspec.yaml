name: ferrit_tool
description: Ferrit Tool - offline troubleshooting + wiring diagrams
publish_to: "none"
version: 0.2.1+8

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  syncfusion_flutter_pdfviewer: ^31.1.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/index/
    - assets/fonts/
    - assets/pdfs/
